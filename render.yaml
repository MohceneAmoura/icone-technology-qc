# Render Blueprint for Icone Technology QC System
# Documentation: https://render.com/docs/blueprint-spec

services:
  # Backend Web Service
  - type: web
    name: icone-tech-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    rootDir: backend
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - fromGroup: icone-tech-db
    region: frankfurt

  # Frontend Static Site
  - type: static
    name: icone-tech-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    rootDir: frontend
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
      - type: rewrite
        source: /api/*
        destination: https://icone-tech-backend.onrender.com/api/:splat
    region: frankfurt

# PostgreSQL Database
databases:
  - name: icone-tech-db
    databaseName: icone
    user: icone_user
    plan: free
    region: frankfurt
