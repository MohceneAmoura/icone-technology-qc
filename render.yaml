
# Render Blueprint for Icone Technology QC System

services:
  # Backend Web Service
  - type: web
    name: icone-tech-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    rootDir: backend
    envVars:
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: icone-tech-db
          property: connectionString
    region: frankfurt

  # Frontend Static Site
  - type: static
    name: icone-tech-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /api/*
        destination: https://icone-tech-backend.onrender.com/api/:splat
      - type: rewrite
        source: /*
        destination: /index.html

# PostgreSQL Database
databases:
  - name: icone-tech-db
    databaseName: icone
    user: icone_user
    plan: free
    region: frankfurt
